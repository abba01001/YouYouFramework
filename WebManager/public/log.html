<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Unity 实时日志控制台</title>
    <style>
        /* 基础环境：浅色纸张感背景 */
        body {
            background: #fdfdfd;
            color: #24292e;
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 顶部控制栏 */
        .toolbar {
            background: #f6f8fa;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid #e1e4e8;
            font-size: 13px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #log-window {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5; /* 针对中文调大行高，更易读 */
            background: #fff;
        }

        /* 日志行样式 */
        .l { display: block; padding: 3px 0; border-bottom: 1px solid #f6f6f6; font-size: 13px; }

        /* 语义化染色 */
        .v { color: #444; }                               /* 普通日志：深灰 */
        .w { color: #855d00; background: #fff9e6; }       /* 警告：暗黄 */
        .e { color: #cf222e; background: #ffeef0; font-weight: bold; } /* 错误：亮红 */
        .s { color: #0969da; font-style: italic; }       /* 系统/进程状态：深蓝 */
        .sys { color: #1a7f37; font-weight: bold; border-bottom: 1px dashed #bee5eb; } /* 工具提示：深绿 */

        /* 控件样式 */
        select, button {
            background: #fff; color: #24292e; border: 1px solid #d0d7de;
            padding: 4px 12px; font-family: inherit; font-size: 12px;
            border-radius: 6px; outline: none; transition: 0.2s;
        }
        button:hover { background: #f3f4f6; border-color: #0969da; color: #0969da; }
        button:active { background: #ebecf0; }

        .btn-start { background: #2da44e !important; color: #fff !important; border: none !important; font-weight: bold; }
        .btn-start:hover { background: #2c974b !important; opacity: 0.9; }

        .st-on { color: #1a7f37; font-weight: bold; }
        .st-off { color: #cf222e; font-weight: bold; }

        .time { color: #8b949e; font-size: 11px; margin-right: 8px; user-select: none; }
    </style>
</head>
<body>

<div class="toolbar">
    <div id="status-tag" class="st-off">● <span id="status-text">连接已断开</span></div>

    <div style="display:flex; align-items:center; gap:8px;">
        <span style="color:#666">选择设备:</span>
        <select id="device-list"><option value="">正在扫描设备...</option></select>
        <button onclick="updateDeviceList()">刷新列表</button>
    </div>

    <button class="btn-start" onclick="startListen()">▶ 开始监控日志</button>

    <div style="flex:1"></div> <div style="display:flex; align-items:center; gap:12px;">
    <label style="color: #57606a; cursor: pointer; display: flex; align-items: center; gap: 4px;">
        <input type="checkbox" id="auto-scroll" checked> 自动滚动
    </label>
    <button onclick="clearLog()">🗑️ 清空屏幕</button>
</div>
</div>

<div id="log-window"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const logWin = document.getElementById('log-window');
    const deviceList = document.getElementById('device-list');
    const statusTag = document.getElementById('status-tag');
    const statusText = document.getElementById('status-text');
    const autoScroll = document.getElementById('auto-scroll');
    const socket = io();

    // 1. 获取设备列表
    async function updateDeviceList() {
        try {
            const res = await fetch('/api/utils/list-devices');
            const devices = await res.json();
            deviceList.innerHTML = devices.length ?
                devices.map(d => `<option value="${d}">${d === '127.0.0.1:16384' ? 'MuMu 模拟器 ('+d+')' : d}</option>`).join('') :
                '<option value="">未找到在线设备</option>';
        } catch(e) {
            deviceList.innerHTML = '<option value="">扫描失败</option>';
        }
    }

    // 2. 启动监听
    function startListen() {
        const serial = deviceList.value;
        if (!serial) {
            alert("请先选择一个有效的设备");
            return;
        }
        appendLog(`[系统] 正在初始化设备日志流: ${serial}`, 'sys');
        fetch(`/api/utils/start-logcat?serial=${serial}`);
    }

    // 3. 处理日志流
    socket.on('adb-log', (msg) => {
        // 核心性能过滤
        if (msg.includes("Ping: Error receiving ICMP packet")) return;

        // --- 新增：处理 ADB 缓冲区起始标识 (如 beginning of crash/main) ---
        if (msg.startsWith('--------- beginning of')) {
            appendLog(msg, 'sys-header');
            return; // 处理完标识符直接跳过后续染色逻辑
        }

        let cls = 'v';
        // 染色逻辑
        // 包含 Native 崩溃 (DEBUG)、Java 崩溃 (AndroidRuntime) 和 Unity 错误 (E Unity)
        if (msg.includes(' E Unity') || msg.includes('AndroidRuntime:E') || msg.includes('DEBUG')) {
            cls = 'e';
        }
        else if (msg.includes(' W Unity')) {
            cls = 'w';
        }
        else if (msg.includes('ActivityManager')) {
            cls = 's';
        }

        appendLog(msg, cls);
    });

    // 2. 修改 appendLog 函数
    function appendLog(text, cls) {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
            now.getMinutes().toString().padStart(2, '0') + ':' +
            now.getSeconds().toString().padStart(2, '0');

        const line = document.createElement('span');
        line.className = `l ${cls}`;

        // --- 核心修改：不再直接用 escapeHtml，而是用 parseUnityRichText ---
        const formattedContent = parseUnityRichText(text);
        line.innerHTML = `<span class="time">${timeStr}</span><span class="content">${formattedContent}</span>`;

        logWin.appendChild(line);

        if (autoScroll.checked) {
            logWin.scrollTop = logWin.scrollHeight;
        }

        if (logWin.children.length > 3000) {
            logWin.removeChild(logWin.firstChild);
        }
    }

    // 保持这个基础转义函数不变，用于底层过滤
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // 1. 新增一个解析 Unity 富文本的函数
    function parseUnityRichText(text) {
        // 先把原始符号转义，防止 XSS 攻击
        let escaped = escapeHtml(text);

        // 替换 Unity 的颜色标签: <color=red>内容</color> -> <span style="color:red">内容</span>
        // 支持 <color=#FF0000> 这种十六进制格式
        escaped = escaped.replace(/&lt;color=(.*?)&gt;(.*?)&lt;\/color&gt;/gi, (match, color, content) => {
            return `<span style="color:${color}">${content}</span>`;
        });

        // 替换粗体: <b>内容</b> -> <strong>内容</strong>
        escaped = escaped.replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/gi, '<strong>$1</strong>');

        // 替换斜体: <i>内容</i> -> <em>内容</em>
        escaped = escaped.replace(/&lt;i&gt;(.*?)&lt;\/i&gt;/gi, '<em>$1</em>');

        return escaped;
    }

    // 防止日志中的 HTML 符号破坏页面
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Socket 连接状态监控
    socket.on('connect', () => {
        statusTag.className = 'st-on';
        statusText.innerText = '服务已连接';
        updateDeviceList();
    });

    socket.on('disconnect', () => {
        statusTag.className = 'st-off';
        statusText.innerText = '服务已断开';
    });

    function clearLog() {
        logWin.innerHTML = '<div class="l sys">[系统] 控制台已清空</div>';
    }
</script>
</body>
</html>
